services:
    app:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        container_name: yandex_reviews_app
        working_dir: /var/www/html
        volumes:
            - ./:/var/www/html
        environment:
            CHROMIUM_PATH: /usr/bin/chromium
        restart: unless-stopped
        depends_on:
            - db

    nginx:
        image: nginx:alpine
        container_name: yandex_reviews_nginx
        ports:
            - "8080:80"
        volumes:
            - ./:/var/www/html
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - app
        restart: unless-stopped

    db:
        image: mysql:8.4
        container_name: yandex_reviews_db
        ports:
            - "3307:3306"
        environment:
            MYSQL_DATABASE: yandex_reviews
            MYSQL_USER: yandex_reviews
            MYSQL_PASSWORD: secret
            MYSQL_ROOT_PASSWORD: root
        volumes:
            - db_data:/var/lib/mysql
        restart: unless-stopped

    queue:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        container_name: yandex_reviews_queue
        environment:
            CHROMIUM_PATH: /usr/bin/chromium
        working_dir: /var/www/html
        command: php artisan queue:work --timeout=300 --tries=1
        volumes:
            - ./:/var/www/html
        depends_on:
            - app
            - db
        restart: unless-stopped

volumes:
    db_data:
